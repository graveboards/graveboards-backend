name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: "Tests (${{ matrix.name }})"
    runs-on: ubuntu-latest

    # The "production-validation" leg runs the suite through Connexion's real request-body
    # validator. It is informational (continue-on-error) until the integration payloads
    # are confirmed against the strict OpenAPI contract; the standard leg gates merges.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: standard
            use_production_validator: ""
            experimental: false
          - name: production-validation
            use_production_validator: "1"
            experimental: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: graveboards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Mirrors .env.test. Security is ENABLED so authorization/privacy tests run for real.
      DEBUG: "true"
      DISABLE_SECURITY: "false"
      ENV: test
      BASE_URL: http://localhost:3000
      JWT_SECRET_KEY: 4FvwZfOE8wXSFOHs5tBuwDMbl5PJ6DsB
      JWT_ALGORITHM: HS256
      OSU_CLIENT_ID: test-client-id
      OSU_CLIENT_SECRET: test-client-secret
      POSTGRESQL_HOST: localhost
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: graveboards_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_DB: "15"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          GRAVEBOARDS_USE_PRODUCTION_VALIDATOR: ${{ matrix.use_production_validator }}
        run: pytest
