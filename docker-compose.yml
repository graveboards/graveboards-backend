x-app-base: &app-base
    image: graveboards-backend:latest
    env_file:
        - ./.env.docker
    volumes:
        - ./instance:/app/instance
    networks:
        - web
    depends_on:
        - postgres
        - redis

services:
    redis:
        image: redis:7-alpine
        container_name: graveboards-redis-dev
        ports:
            - "6379:6379"
        volumes:
            - graveboards-redis-dev-data:/data
        networks:
            - web

    postgres:
        image: postgres:16-alpine
        container_name: graveboards-postgresql-dev
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_PASSWORD=
            - POSTGRES_DB=graveboards_dev
            - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
        volumes:
            - graveboards-postgresql-dev-data:/var/lib/postgresql/data
            - ./docker-init:/docker-entrypoint-initdb.d
        networks:
            - web

    graveboards-backend:
        <<: *app-base
        container_name: graveboards-backend
        build:
            context: .
        ports:
            - "8000:8000"
        environment:
            ENV: "dev"

    graveboards-manage:
        <<: *app-base
        container_name: graveboards-manage
        environment:
            ENV: "dev"
            QUIET: "true"
        profiles:
            - tools

volumes:
    graveboards-redis-dev-data:
    graveboards-postgresql-dev-data:

networks:
    web:
        driver: bridge
