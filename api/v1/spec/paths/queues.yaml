Queues:
    get:
        summary: Returns a list of queues
        tags:
            - Queues
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/query/user.yaml#/UserId"
            - $ref: "../parameters/query/queue.yaml#/IsOpen"
            - $ref: "../parameters/query/search.yaml#/SearchString"
            - $ref: "../parameters/query/search.yaml#/SearchMode"
            - $ref: "../parameters/query/search.yaml#/SearchRelevance"
            - $ref: "../parameters/query/sorting/queue.yaml#/QueueSorting"
            - $ref: "../parameters/query/filters/queue.yaml#/QueueFilter"
            - $ref: "../parameters/query/include/queue.yaml#/QueueInclude"
            - $ref: "../parameters/query/limit.yaml#/Limit"
            - $ref: "../parameters/query/offset.yaml#/Offset"
            - $ref: "../parameters/query/reversed.yaml#/Reversed"
        responses:
            200:
                $ref: "../responses/200/queue.yaml#/QueueResults"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"

    post:
        summary: Adds a queue
        tags:
            - Queues
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        requestBody:
            $ref: "../request_bodies/queue.yaml#/QueueCreate"
        responses:
            201:
                $ref: "../responses/201/queue.yaml#/QueueCreated"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            409:
                $ref: "../responses/409/generic.yaml#/Conflict"

QueueById:
    get:
        summary: Returns the specified queue
        tags:
            - Queues
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
            - $ref: "../parameters/query/include/queue.yaml#/QueueInclude"
        responses:
            200:
                $ref: "../responses/200/queue.yaml#/QueueResult"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"

    patch:
        summary: Updates a queue
        tags:
            - Queues
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
        requestBody:
            $ref: "../request_bodies/queue.yaml#/QueuePatch"
        responses:
            200:
                $ref: "../responses/200/queue.yaml#/QueuePatched"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"

QueueRules:
    get:
        summary: Returns all rules for a queue
        description: |
            Visible to any authenticated caller. Rules marked private (`is_public:
            false`) are omitted from the list unless the caller owns/manages the
            queue or is an admin.
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
        responses:
            200:
                $ref: "../responses/200/rule.yaml#/RuleResults"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"

    post:
        summary: Adds a rule to a queue
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
        requestBody:
            $ref: "../request_bodies/rule.yaml#/RuleCreateBody"
        responses:
            201:
                $ref: "../responses/201/rule.yaml#/RuleCreated"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"
            409:
                $ref: "../responses/409/generic.yaml#/Conflict"

    put:
        summary: Replaces all rules for a queue
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
        requestBody:
            $ref: "../request_bodies/rule.yaml#/RulesReplaceBody"
        responses:
            200:
                $ref: "../responses/200/rule.yaml#/RuleResults"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"
            409:
                $ref: "../responses/409/generic.yaml#/Conflict"

QueueRuleById:
    get:
        summary: Returns the specified rule
        description: |
            Visible to any authenticated caller, unless the rule is marked private
            (`is_public: false`) and the caller doesn't own/manage the queue or isn't
            an admin - in which case it 404s rather than 403s, to match the list
            endpoint's behavior of simply omitting private rules.
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
            - $ref: "../parameters/path/rule.yaml#/RuleId"
        responses:
            200:
                $ref: "../responses/200/rule.yaml#/RuleResult"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"

    patch:
        summary: Updates a rule
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
            - $ref: "../parameters/path/rule.yaml#/RuleId"
        requestBody:
            $ref: "../request_bodies/rule.yaml#/RuleUpdateBody"
        responses:
            200:
                $ref: "../responses/200/rule.yaml#/RulePatched"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"

    delete:
        summary: Deletes a rule
        tags:
            - Rules
        security:
            - BearerAuth: []
            - ApiKeyAuth: []
        parameters:
            - $ref: "../parameters/path/queue.yaml#/QueueId"
            - $ref: "../parameters/path/rule.yaml#/RuleId"
        responses:
            200:
                $ref: "../responses/200/rule.yaml#/RuleDeleted"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
            403:
                $ref: "../responses/403/generic.yaml#/Forbidden"
            404:
                $ref: "../responses/404/generic.yaml#/NotFound"
