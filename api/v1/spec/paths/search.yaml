Search:
    get:
        summary: Executes a search
        description: |
            No blanket auth requirement - most scopes (beatmaps, beatmapsets, scores,
            profiles) are public. Scopes backed by auth-required resources (queues,
            requests) are gated by a manual token check in the handler instead of an
            OpenAPI `security` requirement, since that requirement can't be
            conditioned on the `scope` field inside the `q` payload. Those scopes
            return 401 without a valid Bearer token or API key.
        tags:
            - Search
        parameters:
            - $ref: "../parameters/query/search.yaml#/Q"
            - $ref: "../parameters/query/search.yaml#/Compressed"
            - $ref: "../parameters/query/include/search.yaml#/SearchInclude"
            - $ref: "../parameters/query/limit.yaml#/Limit"
            - $ref: "../parameters/query/offset.yaml#/Offset"
            - $ref: "../parameters/query/reversed.yaml#/Reversed"
        responses:
            200:
                $ref: "../responses/200/search.yaml#/SearchResults"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"
            401:
                $ref: "../responses/401/generic.yaml#/Unauthorized"
    post:
        summary: Creates a search resource
        tags:
            - Search
        requestBody:
            $ref: "../request_bodies/search.yaml#/SearchCreate"
        responses:
            201:
                $ref: "../responses/201/search.yaml#/SearchCreated"
            400:
                $ref: "../responses/400/generic.yaml#/BadRequest"